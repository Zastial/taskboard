name: CI

on:
  push:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local
    runs-on: ubuntu-latest
    needs: push-ghcr
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.TUNNEL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.TUNNEL_PORT }} deploy@${{ secrets.TUNNEL_HOST }} << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Starting deployment..."
          
          REGISTRY="ghcr.io"
          REPO="${GITHUB_REPOSITORY}"
          TAG="${GITHUB_SHA::7}"
          IMAGE="${REGISTRY}/${REPO}:${TAG}"
          
          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"
          
          echo "Stopping existing containers..."
          docker stop taskboard-app taskboard-db 2>/dev/null || true
          docker rm taskboard-app taskboard-db 2>/dev/null || true
          
          echo "Starting database..."
          docker run -d \
            --name taskboard-db \
            -e POSTGRES_USER=taskboard \
            -e POSTGRES_PASSWORD=taskboard123 \
            -e POSTGRES_DB=taskboard \
            -v postgres_data:/var/lib/postgresql/data \
            -p 5432:5432 \
            postgres:16-alpine
          
          # Wait for DB
          echo "Waiting for database..."
          for i in {1..30}; do
            if docker exec taskboard-db pg_isready -U taskboard >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          
          if ! docker exec taskboard-db pg_isready -U taskboard >/dev/null 2>&1; then
            echo "Database failed"
            exit 1
          fi
          
          echo "Starting application..."
          docker run -d \
            --name taskboard-app \
            --link taskboard-db:db \
            -e DATABASE_URL=postgresql://taskboard:taskboard123@db:5432/taskboard \
            -e JWT_SECRET=secret-key-for-development-only \
            -e PORT=3000 \
            -p 3000:3000 \
            "$IMAGE"
          
          echo "Waiting for application..."
          for i in {1..30}; do
            if curl -f http://localhost:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          
          if ! curl -f http://localhost:3000/health >/dev/null 2>&1; then
            echo "Healthcheck failed"
            exit 1
          fi
          
          echo "Deployment successful!"
          EOF
