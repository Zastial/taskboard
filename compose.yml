version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: taskboard-db
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard123
      POSTGRES_DB: taskboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskboard-app
    environment:
      DATABASE_URL: postgresql://taskboard:taskboard123@db:5432/taskboard
      JWT_SECRET: secret-key-for-development-only
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 || r.statusCode === 503 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
